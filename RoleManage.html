<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roller — AiMedicalSupport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"/>
  <link rel="stylesheet" href="Theme.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Outfit', sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-up   { animation: fadeUp 0.5s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.12s; }
    .fade-up-3 { animation-delay: 0.19s; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
      font-family: 'Syne', sans-serif;
    }

    .input-field {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-second);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      width: 100%; outline: none;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus { border-color: var(--accent); }
    select.input-field option { background: var(--bg-card); color: var(--text-second); }

    .btn-primary {
      background: linear-gradient(135deg, #63cab7 0%, #3b9e8a 100%);
      transition: opacity 0.2s, transform 0.15s;
      font-family: 'Syne', sans-serif; font-weight: 600;
      border: none; cursor: pointer; color: white;
      border-radius: 10px; padding: 10px 20px; font-size: 14px;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .role-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 1rem;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .role-card:hover { border-color: rgba(99,202,183,0.35); }
    .role-card.active {
      border-color: var(--accent);
      background: rgba(99,202,183,0.05);
    }

    .perm-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px; font-size: 12px;
      font-family: 'Syne', sans-serif; font-weight: 600;
      background: rgba(99,202,183,0.1); color: var(--accent);
      border: 1px solid rgba(99,202,183,0.2);
    }
    .perm-chip .remove-btn {
      cursor: pointer; opacity: 0.6; transition: opacity 0.15s;
      background: none; border: none; color: inherit; padding: 0;
      font-size: 11px; line-height: 1;
    }
    .perm-chip .remove-btn:hover { opacity: 1; }

    .perm-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s; font-size: 13px;
    }
    .perm-option:hover { background: var(--bg-secondary); }
    .perm-option.assigned {
      background: rgba(99,202,183,0.06);
      color: var(--accent);
    }

    .user-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .user-item:hover { background: var(--bg-secondary); }
    .user-item.selected {
      background: rgba(99,202,183,0.07);
      border-color: rgba(99,202,183,0.25);
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(99,202,183,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--accent);
      flex-shrink: 0; font-family: 'Syne', sans-serif;
    }

    .tab-btn {
      position: relative; padding-bottom: 10px;
      font-weight: 600; font-size: 0.9rem;
      transition: color 0.2s; background: none; border: none; cursor: pointer;
      font-family: 'Syne', sans-serif;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      height: 2px; width: 0; background: var(--accent);
      transition: width 0.3s ease; border-radius: 2px;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { width: 100%; }
    .tab-btn:not(.active) { color: var(--text-muted); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1rem; color: var(--text-muted);
      gap: 8px;
    }
  </style>
</head>
<body class="min-h-screen flex" style="background: var(--bg-primary);">

<div id="AdminMenu"></div>
<div id="themeBtn" style="right: 30px; position: fixed; top: 15px; z-index: 999;"></div>

<main class="flex-1 py-8" style="background-color: var(--bg-thiry);">

  <!-- Başlık -->
  <div class="fade-up fade-up-1 mb-8">
   
    <h1 style="font-family: 'Syne', sans-serif; font-size: 1.75rem; color: var(--text-primary); margin-top: 8px;">
      Rol Yönetimi
    </h1>
    <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">
      Rolleri görüntüleyin, yetkilerini düzenleyin, kullanıcılara atayın
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 flex-1 gap-6">

    
    <div class="lg:col-span-1 fade-up fade-up-2">
      <div class="card">
        <p class="section-label"><i class="fa-solid fa-shield-halved" style="margin-right: 6px;"></i>Roller</p>
        <div id="roleListLoader" class="empty-state">
          <div class="spinner"></div>
          <span style="font-size: 13px;">Yükleniyor...</span>
        </div>
        <div id="roleList" class="flex flex-col gap-2 hidden"></div>
      </div>
    </div>

    <!-- Sağ: Detay paneli -->
    <div class="lg:col-span-2 fade-up fade-up-3">

      <!-- Boş durum -->
      <div id="emptyDetail" class="card empty-state" style="min-height: 400px;">
        <i class="fa-solid fa-shield-halved" style="font-size: 36px; color: var(--border);"></i>
        <p style="font-size: 14px;">Bir rol seçin</p>
      </div>

      <!-- Detay -->
      <div id="roleDetail" class="hidden flex-col gap-5">

        <!-- Rol başlık -->
        <div class="card">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(99,202,183,0.12); display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-shield-halved" style="color: var(--accent); font-size: 16px;"></i>
              </div>
              <div>
                <h2 id="detailRoleName" style="font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--text-second); margin: 0;"></h2>
                <p id="detailPermCount" style="font-size: 12px; color: var(--text-muted); margin: 0;"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab -->
        <div class="flex gap-6" style="border-bottom: 1px solid var(--border); padding-bottom: 0;">
          <button class="tab-btn active" id="tabPerms" onclick="switchTab('perms')">
            <i class="fa-solid fa-key" style="margin-right: 6px;"></i>Yetkiler
          </button>
          <button class="tab-btn" id="tabUsers" onclick="switchTab('users')">
            <i class="fa-solid fa-users" style="margin-right: 6px;"></i>Kullanıcıya Ata
          </button>
        </div>

        <!-- Yetkiler tab -->
        <div id="permsTab">
          <div class="card">
            <p class="section-label">Mevcut Yetkiler</p>
            <div id="currentPerms" class="flex flex-wrap gap-2 mb-4 min-h-8"></div>
            <div style="border-top: 1px solid var(--border); padding-top: 12px;">
              <p class="section-label" style="margin-top: 4px;">Tüm Yetkiler</p>
              <div id="allPermsList" class="flex flex-col gap-1"></div>
            </div>
            <div class="flex justify-end mt-4">
              <button class="btn-primary" onclick="savePermissions()" id="savePermsBtn">
                <i class="fa-solid fa-floppy-disk" style="margin-right: 8px;"></i>Kaydet
              </button>
            </div>
          </div>
        </div>

        <!-- Kullanıcıya ata tab -->
        <div id="usersTab" class="hidden">
          <div class="card">
            <p class="section-label">Kullanıcı Seç</p>
            <input type="text" id="userSearch" class="input-field mb-3"
                   placeholder="İsim ile ara..." oninput="searchUsers()"/>
            <div id="userList" class="flex flex-col gap-1" style="max-height: 280px; overflow-y: auto;">
              <p style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 1rem;">Aramaya başlayın</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<script>
  const API = 'http://localhost:8000/api/v1';
  let selectedRoleId = null;
  let selectedRoleName = null;
  let allPermissions = [];
  let assignedPermIds = new Set();
  let userSearchTimeout = null;

  document.addEventListener('DOMContentLoaded', () => {
    Theme.renderToggle('themeBtn');
    loadRoles();
    loadAllPermissions();
  });

  async function loadRoles() {
    try {
      const res = await fetch(`${API}/Role/AllRoles`, { credentials: 'include' });
      const roles = await res.json();
      renderRoles(roles);
    } catch {
      document.getElementById('roleListLoader').innerHTML =
        '<p style="color: var(--text-green); font-size: 13px;">Yüklenemedi</p>';
    }
  }

  function renderRoles(roles) {
    const loader = document.getElementById('roleListLoader');
    const list = document.getElementById('roleList');
    loader.classList.add('hidden');
    list.classList.remove('hidden');
    list.innerHTML = roles.map(r => `
      <div style="color: var(--text-green);" class="role-card ${r.id === selectedRoleId ? 'active' : ''}"
           onclick="selectRole(${r.id}, '${r.name}')">
        <div class="flex items-center gap-3">
          <div  style="width: 32px; height: 32px; border-radius: 8px;color: var(--text-green); background: rgba(99,202,183,0.1);
                      display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-shield-halved" style="color: var(--accent); font-size: 13px;"></i>
          </div>
          <div>
            <p style="font-size: 13px; font-weight: 600; color: var(--text-green); font-family: 'Syne', sans-serif;">${r.name}</p>
          </div>
        </div>
      </div>
    `).join('');
  }

  async function loadAllPermissions() {
    try {
      const res = await fetch(`${API}/Role/AllPermissions`, { credentials: 'include' });
      allPermissions = await res.json();
    } catch {}
  }

  async function selectRole(id, name) {
    selectedRoleId = id;
    selectedRoleName = name;

    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
    event.currentTarget.classList.add('active');

    document.getElementById('emptyDetail').classList.add('hidden');
    const detail = document.getElementById('roleDetail');
    detail.classList.remove('hidden');
    detail.style.display = 'flex';

    document.getElementById('detailRoleName').textContent = name;

    try {
      const res = await fetch(`${API}/Role/RolePermissions/${id}`, { credentials: 'include' });
      const data = await res.json();
      assignedPermIds = new Set(data.permissions.map(p => p.id));
      document.getElementById('detailPermCount').textContent = `${assignedPermIds.size} yetki atanmış`;
      renderPermissions();
    } catch {}
  }

  function renderPermissions() {
    const current = document.getElementById('currentPerms');
    const allList = document.getElementById('allPermsList');

    current.innerHTML = allPermissions
      .filter(p => assignedPermIds.has(p.id))
      .map(p => `
        <span class="perm-chip">
          ${p.name}
          <button class="remove-btn" onclick="togglePerm(${p.id}, event)">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </span>
      `).join('') || '<p style="color: var(--text-muted); font-size: 13px;">Henüz yetki yok</p>';

    allList.innerHTML = allPermissions.map(p => {
      const assigned = assignedPermIds.has(p.id);
      return `
        <div class="perm-option ${assigned ? 'assigned' : ''}" onclick="togglePerm(${p.id}, event)">
          <div>
            <p style="font-size: 13px; font-weight: 500; color: ${assigned ? 'var(--accent)' : 'var(--text-second)'};">${p.name}</p>
            <p style="font-size: 11px; color: var(--text-muted);">${p.description || ''}</p>
          </div>
          <i class="fa-solid ${assigned ? 'fa-circle-check' : 'fa-circle'}"
             style="color: ${assigned ? 'var(--accent)' : 'var(--border)'}; font-size: 16px;"></i>
        </div>
      `;
    }).join('');
  }

  function togglePerm(permId, e) {
    e.stopPropagation();
    if (assignedPermIds.has(permId)) assignedPermIds.delete(permId);
    else assignedPermIds.add(permId);
    document.getElementById('detailPermCount').textContent = `${assignedPermIds.size} yetki atanmış`;
    renderPermissions();
  }

  async function savePermissions() {
    if (!selectedRoleId) return;
    const btn = document.getElementById('savePermsBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span>';
    try {
      const res = await fetch(`${API}/Role/UpdateRolePermissions/${selectedRoleId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ permission_ids: [...assignedPermIds] })
      });
      if (res.ok) {
        btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:6px;"></i>Kaydedildi';
        setTimeout(() => {
          btn.innerHTML = '<i class="fa-solid fa-floppy-disk" style="margin-right:8px;"></i>Kaydet';
          btn.disabled = false;
        }, 1500);
      }
    } catch {
      btn.innerHTML = '<i class="fa-solid fa-floppy-disk" style="margin-right:8px;"></i>Kaydet';
      btn.disabled = false;
    }
  }

  function switchTab(tab) {
    const isPerms = tab === 'perms';
    document.getElementById('permsTab').classList.toggle('hidden', !isPerms);
    document.getElementById('usersTab').classList.toggle('hidden', isPerms);
    document.getElementById('tabPerms').classList.toggle('active', isPerms);
    document.getElementById('tabUsers').classList.toggle('active', !isPerms);
  }

  function searchUsers() {
    clearTimeout(userSearchTimeout);
    const q = document.getElementById('userSearch').value.trim();
    if (q.length < 2) {
      document.getElementById('userList').innerHTML =
        '<p style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 1rem;">Aramaya başlayın</p>';
      return;
    }
    userSearchTimeout = setTimeout(async () => {
      try {
        const res = await fetch(`${API}/personel/GetAllPersonel`, { credentials: 'include' });
        const users = await res.json();
        const filtered = users.filter(u =>
          u.full_name.toLowerCase().includes(q.toLowerCase())
        );
        renderUsers(filtered);
      } catch {
        document.getElementById('userList').innerHTML =
          '<p style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 1rem;">Bağlantı hatası</p>';
      }
    }, 350);
  }

  function renderUsers(users) {
    const list = document.getElementById('userList');
    if (!users.length) {
      list.innerHTML = '<p style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 1rem;">Kullanıcı bulunamadı</p>';
      return;
    }
    list.innerHTML = users.map(u => `
      <div class="user-item" onclick="assignRole(${u.id}, '${u.full_name}', this)">
        <div class="avatar">${u.full_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div style="flex: 1;">
          <p style="font-size: 13px; font-weight: 500; color: var(--text-second);">${u.full_name}</p>
          <p style="font-size: 11px; color: var(--text-muted);">${u.specialty || '—'}</p>
        </div>
        <div id="roleStatus-${u.id}" style="font-size: 11px; color: var(--text-muted);">
          ${u.roles ? u.roles.join(', ') : ''}
        </div>
      </div>
    `).join('');
  }

  async function assignRole(userId, userName, el) {
    if (!selectedRoleId) return;
    const statusEl = document.getElementById(`roleStatus-${userId}`);
    statusEl.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;"></span>';

    try {
      const meRes = await fetch(`${API}/personel/GetByIdPersonel/${userId}`, { credentials: 'include' });
      const user = await meRes.json();
      const currentRoles = user.roles || [];

      const roleIds = [];
      const allRolesRes = await fetch(`${API}/Role/AllRoles`, { credentials: 'include' });
      const allRoles = await allRolesRes.json();
      currentRoles.forEach(rName => {
        const found = allRoles.find(r => r.name === rName);
        if (found) roleIds.push(found.id);
      });
      if (!roleIds.includes(selectedRoleId)) roleIds.push(selectedRoleId);

      const res = await fetch(`${API}/Role/UpdateUserRole`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ id: userId, role_ids: roleIds })
      });

      if (res.ok) {
        el.classList.add('selected');
        statusEl.innerHTML = `<i class="fa-solid fa-circle-check" style="color: var(--accent); font-size: 13px;"></i>`;
        setTimeout(() => {
          statusEl.textContent = [...currentRoles, selectedRoleName].join(', ');
          el.classList.remove('selected');
        }, 1500);
      }
    } catch {
      statusEl.textContent = 'Hata';
    }
  }
</script>

<script src="MenuLoader.js"></script>
<script src="AdminMenuOptions.js"></script>
<script src="Template.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    Theme.renderToggle('themeBtn');
  });
</script>
</body>
</html>
