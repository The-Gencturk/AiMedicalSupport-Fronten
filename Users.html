    @keyframes fadeUp {

<script>
let currentPage = 1;
const defaultPageSize = 10;
let currentPageSize = defaultPageSize;

async function loadUsers(page = 1) {
  try {
    const response = await fetch(
      `http://localhost:8000/api/v1/personel/GetAllPersonel?page=${page}&pageSize=${currentPageSize}`,
      {
        method: "GET",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include"
      }
    );

    if (!response.ok) {
      throw new Error("HTTP Hatasi: " + response.status);
    }

    const payload = await response.json();
    const normalized = normalizeUsersResponse(payload);
    const users = normalized.data.map(normalizeUser);

    currentPage = normalized.page;
    currentPageSize = normalized.pageSize;

    renderUsers(users);
    updateHeaderCounts(users, normalized.total);
    renderPagination(normalized.total, normalized.page, normalized.pageSize);
    updateResultsInfo(normalized.total, normalized.page, normalized.pageSize, users.length);
  } catch (error) {
    console.error("API hatasi:", error);
  }
}

function goToPage(page) {
  if (page < 1 || page === currentPage) return;
  loadUsers(page);
}

function getRoleBadge(user) {
  const roleName = user.specialty;

  if (roleName === "SuperAdmin") {
    return `
      <span style="
        background-color: #EEFF00;
        color: #820000;
        padding: 4px 10px;
        border-radius: 9999px;
        font-size: 14px;
      ">
        <i style="color: rgb(255 0 0)" class="fa-solid fa-crown"></i> Super Admin
      </span>`;
  }

  if (roleName === "Admin") {
    return `
      <span style="
        background-color: #ef4444;
        color: #fff;
        padding: 4px 10px;
        border-radius: 9999px;
        font-size: 14px;
      ">
        Admin
      </span>`;
  }

  if (roleName === "User" || roleName === "Hasta") {
    return `<span class="px-2 py-1 text-sm rounded-full bg-primary/20 text-primary">Kullanici</span>`;
  }

  return `<span class="px-2 py-1 text-sm rounded-full bg-slate-700/40 text-slate-200">${roleName ?? "-"}</span>`;
}

function renderUsers(users) {
  const tbody = document.querySelector("table tbody");
  if (!tbody) return;

  tbody.innerHTML = "";

  if (users.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="p-4 text-center text-gray-500 dark:text-gray-400">Kayit bulunamadi.</td>
      </tr>
    `;
  }

  users.forEach((user) => {
    const tr = document.createElement("tr");

    const statusSpan = user.isActive
      ? `<span class="px-2 py-1 text-sm rounded-full bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300">Aktif</span>`
      : `<span class="px-2 py-1 text-sm rounded-full bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300">Pasif</span>`;

    tr.innerHTML = `
      <td class="p-4" style="color: var(--text-second);">${user.fullName}</td>
      <td class="p-4 text-gray-500 dark:text-gray-400" style="color: var(--text-second);">${user.email ?? "-"}</td>
      <td class="p-4">${getRoleBadge(user)}</td>
      <td class="p-4">${statusSpan}</td>
      <td class="p-4">
        <a class="font-medium text-primary hover:underline" href="UsersDetails.html?UserID=${user.id}">
          Görüntüle
        </a>
      </td>
    `;

    tbody.appendChild(tr);
  });

  const mobileList = document.getElementById("mobileUserList");
  if (mobileList) {
    mobileList.innerHTML = "";

    users.forEach((user) => {
      const statusTag = user.isActive
        ? `<span class="px-2 py-1 text-xs rounded-full bg-green-900 text-green-300">Aktif</span>`
        : `<span class="px-2 py-1 text-xs rounded-full bg-red-900 text-red-300">Pasif</span>`;

      mobileList.innerHTML += `
        <div class="rounded-xl border border-gray-700 p-4 bg-gray-900/50">
          <div class="font-semibold text-white">${user.fullName}</div>
          <div class="text-sm text-gray-400">${user.email ?? "-"}</div>
          <div class="flex gap-2 mt-2">${getRoleBadge(user)} ${statusTag}</div>
          <a class="inline-block mt-3 text-primary text-sm" href="UsersDetails.html?UserID=${user.id}">
            Detay ->
          </a>
        </div>
      `;
    });
  }
}

function renderPagination(totalUsers, activePage, apiPageSize = defaultPageSize) {
  const pagination = document.querySelector("nav[aria-label='Pagination']");
  if (!pagination) return;

  const totalPages = Math.max(1, Math.ceil((totalUsers || 0) / (apiPageSize || defaultPageSize)));

  pagination.className = "isolate flex flex-row flex-nowrap items-center whitespace-nowrap rounded-md";
  pagination.innerHTML = "";

  const prevBtn = document.createElement("a");
  prevBtn.href = "#";
  prevBtn.innerHTML = `
    <span class="sr-only">Previous</span>
    <svg viewBox="0 0 20 20" fill="currentColor" class="size-5">
      <path d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z" />
    </svg>
  `;
  prevBtn.className = "relative inline-flex shrink-0 items-center rounded-l-md px-2 py-2 text-gray-400 inset-ring inset-ring-gray-700 hover:bg-white/5";
  prevBtn.addEventListener("click", (e) => {
    e.preventDefault();
    if (activePage > 1) goToPage(activePage - 1);
  });
  pagination.appendChild(prevBtn);

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("a");
    btn.href = "#";
    btn.textContent = i;
    btn.className =
      "relative inline-flex shrink-0 items-center px-4 py-2 text-sm font-semibold hover:bg-white/5 focus:z-20 focus:outline-offset-0 " +
      (i === activePage ? "bg-indigo-500 text-white" : "text-gray-200 inset-ring inset-ring-gray-700");
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      goToPage(i);
    });
    pagination.appendChild(btn);
  }

  const nextBtn = document.createElement("a");
  nextBtn.href = "#";
  nextBtn.innerHTML = `
    <span class="sr-only">Next</span>
    <svg viewBox="0 0 20 20" fill="currentColor" class="size-5">
      <path d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" />
    </svg>
  `;
  nextBtn.className = "relative inline-flex shrink-0 items-center rounded-r-md px-2 py-2 text-gray-400 inset-ring inset-ring-gray-700 hover:bg-white/5";
  nextBtn.addEventListener("click", (e) => {
    e.preventDefault();
    if (activePage < totalPages) goToPage(activePage + 1);
  });
  pagination.appendChild(nextBtn);
}

function updateResultsInfo(total, page, currentSize, fetchedCount) {
  const resultsInfo = document.querySelector(".text-sm.text-gray-300");
  if (!resultsInfo) return;

  if (!total || fetchedCount === 0) {
    resultsInfo.innerHTML = "Kayit bulunamadi.";
    return;
  }

  const start = (page - 1) * currentSize + 1;
  const end = Math.min(start + fetchedCount - 1, total);

  resultsInfo.innerHTML = `
    <span class="font-medium">${start}</span> - <span class="font-medium">${end}</span>
    arasi gosteriliyor, toplam <span class="font-medium">${total}</span> kullanici
  `;
}

function updateHeaderCounts(users, totalFromApi) {
  const totalUsersEl = document.getElementById("TotalUsers");
  const totalAdminsEl = document.getElementById("TotalAdmins");

  if (totalUsersEl) {
    totalUsersEl.textContent = String(totalFromApi ?? users.length ?? 0);
  }

  if (totalAdminsEl) {
    const adminCount = users.filter((item) => item.specialty === "Admin" || item.specialty === "SuperAdmin").length;
    totalAdminsEl.textContent = String(adminCount);
  }
}

function normalizeUsersResponse(payload) {
  if (payload && Array.isArray(payload.data)) {
    return {
      total: Number(payload.total ?? payload.data.length),
      page: Number(payload.page ?? 1),
      pageSize: Number(payload.page_size ?? payload.pageSize ?? defaultPageSize),
      data: payload.data
    };
  }

  const fallback = Array.isArray(payload?.$values)
    ? payload.$values
    : Array.isArray(payload)
      ? payload
      : [];

  return {
    total: fallback.length,
    page: 1,
    pageSize: defaultPageSize,
    data: fallback
  };
}

function normalizeUser(user) {
  const oldName = [user.realName, user.realSurname].filter(Boolean).join(" ").trim();

  return {
    id: user.id ?? user.userID ?? user.userId ?? "",
    fullName: user.full_name ?? user.fullName ?? oldName ?? "-",
    email: user.email ?? user.userEpost ?? "-",
    specialty: user.specialty ?? user.role?.name ?? (user.admin ? "Admin" : "User"),
    isActive: typeof user.is_active === "boolean" ? user.is_active : Boolean(user.userStatus)
  };
}

document.addEventListener("DOMContentLoaded", async () => {
  Theme.renderToggle("themeBtn");
  await getCurrentUser();
  loadUsers(currentPage);
});
</script>
