<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Sayfası</title>
  <script src="https://cdn.tailwindcss.com"></script>
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
  <link rel="stylesheet" href="Theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Outfit', sans-serif; }


    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.32; }
    }
    @keyframes scan {
      0%   { top: 0%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .fade-up { animation: fadeUp 0.65s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.15s; }
    .fade-up-3 { animation-delay: 0.25s; }
    .fade-up-4 { animation-delay: 0.35s; }
    .pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
    .scan-line {
      position: absolute; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(99,202,183,0.6), transparent);
      animation: scan 3s ease-in-out infinite;
    }
    .field-enter { animation: slideIn 0.28s ease both; }

    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f1f5f9;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.22); }
    .input-field:focus {
      outline: none;
      border-color: rgba(99,202,183,0.6);
      background: rgba(255,255,255,0.07);
    }

    .tab-btn {
      position: relative;
      padding-bottom: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      height: 2px; width: 0;
      background: #63cab7;
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .tab-btn.active { color: #63cab7; }
    .tab-btn.active::after { width: 100%; }
    .tab-btn:not(.active) { color: rgba(255,255,255,0.28); }

    .btn-primary {
      background: linear-gradient(135deg, #63cab7 0%, #3b9e8a 100%);
      transition: opacity 0.2s, transform 0.15s;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

 .card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
  </style>
</head>
<body class="min-h-screen flex" style="background: var(--bg-primary);">

<div id="AdminMenu"></div>
<div id="themeBtn" style="right: 30px; position: fixed; top:15px;"></div>

<main class="flex-1 p-8">
<header style="border: var(--border); border: solid 2px; background-color: var(--bg-thiry);"  class="mb-8 flex items-center justify-center gap-8 dark:bg-background-dark p-8 rounded-xl  transition-all duration-00 ease-in-out">

  <img id="userProfile"  alt="Profil" style="border:solid 3px #37ff00ec;" class="w-20 h-20 rounded-full border border-slate-900 "/>
  <div class="text-center ">
    <h2 class="text-3xl font-bold text-slate-900 dark:text-white" style="color: var(--text-primary);">Hoşgeldin</h2>
    <span id="username" class="block text-1xl font-semibold text-slate-700 dark:text-gray-300" style="color: var(--text-second);"></span>
    <p id="changingText" class="text-slate-500 transition-opacity duration-500" style="color: var(--text-yellow); font-size: large; "></p>
  </div>
</header> 


</header>
<div>
<h3 class="text-xl font-bold text-slate-900 dark:text-white mb-4" style="color: var(--text-second);">Özet</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div style="border: var(--border); border: solid 2px; background-color: var(--bg-thiry);" class="bg-background-light dark:bg-background-dark p-6 rounded-xl">

</div>

<p class="text-sm font-medium text-slate-500 dark:text-slate-400" style="color: var(--text-muted);">Toplam Hasta</p>
<p  id="pendingOrders" class="text-3xl font-bold text-slate-900 dark:text-white" style="color: var(--text-second);">21</p>
</div>
<div style="border: var(--border); border: solid 2px; background-color: var(--bg-thiry);"  class="bg-background-light dark:bg-background-dark p-6 rounded-xl">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400" style="color: var(--text-muted);">Sadace Bugün</p>
<p id="TotalUsers" class="text-3xl font-bold text-slate-900 dark:text-white TotalUsers" style="color: var(--text-second);">2</p>
</div>
<div style="border: var(--border); border: solid 2px; background-color: var(--bg-thiry);"   class="bg-background-light dark:bg-background-dark p-6 rounded-xl">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400" style="color: var(--text-muted);">Doğruluk Oranı</p>
<p id="TotalUsers" class="text-3xl font-bold text-slate-900 dark:text-white TotalUsers" style="color: var(--text-second);">78</p>
</div>
<div style="border: var(--border); border: solid 2px; background-color: var(--bg-thiry);"  class="bg-background-light dark:bg-background-dark p-6 rounded-xl">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400" style="color: var(--text-muted);">Toplam Personel</p>
<p id="TotalUsers" class="text-3xl font-bold text-slate-900 dark:text-white TotalUsers" style="color: var(--text-second);">4</p>
</div>
<div style="border: var(--border); border: solid 2px; background-color: var(--bg-thiry);"  class="bg-background-light dark:bg-background-dark p-6 rounded-xl">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400" style="color: var(--text-muted);">Ai Eğitimi</p>
<p id="TotalUsers" class="text-3xl font-bold text-slate-900 dark:text-white TotalUsers" style="color: var(--text-second);">0</p>
</div>
</div>
</div>
<div class="mt-8">
<h3 class="text-xl font-bold text-slate-900 dark:text-white mb-4">Son Aktiviteler</h3>  

<div class="overflow-x-auto bg-background-light dark:bg-background-dark rounded-xl border border-primary/20 dark:border-primary/30">
<table class="w-full text-sm text-left text-slate-500 dark:text-slate-400">

<thead class="text-xs text-slate-700 dark:text-slate-300 uppercase bg-primary/20 dark:bg-primary/30">
<tr>
<th class="px-6 py-3" scope="col">Analiz Id</th>
<th class="px-6 py-3" scope="col">Hasta</th>
<th class="px-6 py-3" scope="col">Tarih</th>
<th class="px-6 py-3" scope="col">Durum</th>
<th class="px-6 py-3 text-right " scope="col">Toplam</th>
<th class="px-6 py-3" scope="col"></th>
</tr>
</thead>
<tbody>
<tr class="bg-background-light dark:bg-background-dark border-b border-primary/20 dark:border-primary/30">
<th class="px-6 py-4 font-medium text-slate-900 dark:text-white whitespace-nowrap" scope="row"></th>
<td class="px-6 py-4"></td>
<td class="px-6 py-4"></td>
<td class="px-6 py-4">
<span class="status-badge status-beklemede"></span>
</td>
<td class="px-6 py-4 text-right"></td>
</body>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
     Theme.renderToggle('themeBtn');
   const user = await getCurrentUser();
   let UserProfile = document.getElementById("userProfile");
   UserProfile.src = user.profile;
  });
  
</script>
<script src="MenuLoader.js"></script>
<script src="auth.js"></script>
<script src="AdminMenuOptions.js"></script>
<script src="Template.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const messages = [
        `Bugün neler olur bitiğini görün  ${new Date().toLocaleDateString()}`,
        `Bugünün Kanama Sayısı 0`,
    ];

    const textElem = document.getElementById("changingText");
    let index = 0;

    function changeText() {
        textElem.style.opacity = 0;
        setTimeout(() => {
            textElem.textContent = messages[index];
            textElem.style.opacity = 1;
            index = (index + 1) % messages.length;
        }, 900);
    }

    changeText(); 
    setInterval(changeText, 3500); 
});</script>
</html>
