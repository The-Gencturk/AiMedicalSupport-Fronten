<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AiMedicalSupport — Giriş</title>
  <script src="https://cdn.tailwindcss.com"></script>
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
  <link rel="stylesheet" href="Theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Outfit', sans-serif; }


    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.32; }
    }
    @keyframes scan {
      0%   { top: 0%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes orbitSpinA {
      from { transform: rotateX(72deg) rotateZ(0deg); }
      to   { transform: rotateX(72deg) rotateZ(360deg); }
    }
    @keyframes orbitSpinB {
      from { transform: rotateY(72deg) rotateZ(360deg); }
      to   { transform: rotateY(72deg) rotateZ(0deg); }
    }
    @keyframes orbitSpinC {
      from { transform: rotateX(24deg) rotateY(56deg) rotateZ(0deg); }
      to   { transform: rotateX(24deg) rotateY(56deg) rotateZ(360deg); }
    }
    @keyframes floatCore {
      0%, 100% { transform: translateY(0px); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.1); opacity: 0.95; }
    }

    .fade-up { animation: fadeUp 0.65s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.15s; }
    .fade-up-3 { animation-delay: 0.25s; }
    .fade-up-4 { animation-delay: 0.35s; }
    .pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
    .scan-line {
      position: absolute; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(99,202,183,0.6), transparent);
      animation: scan 3s ease-in-out infinite;
    }
    .field-enter { animation: slideIn 0.28s ease both; }

    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f1f5f9;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.22); }
    .input-field:focus {
      outline: none;
      border-color: rgba(99,202,183,0.6);
      background: rgba(255,255,255,0.07);
    }

    .tab-btn {
      position: relative;
      padding-bottom: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      height: 2px; width: 0;
      background: #63cab7;
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .tab-btn.active { color: #63cab7; }
    .tab-btn.active::after { width: 100%; }
    .tab-btn:not(.active) { color: rgba(255,255,255,0.28); }

    .btn-primary {
      background: linear-gradient(135deg, #63cab7 0%, #3b9e8a 100%);
      transition: opacity 0.2s, transform 0.15s;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-google {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.16);
      color: #f1f5f9;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      font-weight: 500;
    }
    .btn-google:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0px); }
    .btn-google:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.8);
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      height: 1px;
      flex: 1;
      background: rgba(148,163,184,0.35);
    }

    .holo-wrap {
      width: 320px;
      height: 320px;
      perspective: 1000px;
    }
    .holo-core {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: floatCore 7s ease-in-out infinite;
    }
    .holo-ring {
      position: absolute;
      inset: 18px;
      border-radius: 9999px;
      border: 1px solid rgba(99,202,183,0.22);
      box-shadow: inset 0 0 24px rgba(99,202,183,0.08);
      transform-style: preserve-3d;
    }
    .holo-ring.ring-a { animation: orbitSpinA 14s linear infinite; }
    .holo-ring.ring-b {
      inset: 36px;
      border-color: rgba(99,202,183,0.3);
      animation: orbitSpinB 16s linear infinite;
    }
    .holo-ring.ring-c {
      inset: 58px;
      border-color: rgba(160,255,232,0.35);
      animation: orbitSpinC 18s linear infinite;
    }
    .holo-glow {
      position: absolute;
      inset: 82px;
      border-radius: 9999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(170,255,240,0.9) 0%, rgba(99,202,183,0.8) 24%, rgba(35,88,95,0.65) 54%, rgba(8,15,26,0) 72%);
      filter: blur(0.4px);
      animation: corePulse 3.4s ease-in-out infinite;
    }
    .holo-grid {
      position: absolute;
      inset: 112px;
      border-radius: 9999px;
      border: 1px solid rgba(177,255,240,0.35);
      background: repeating-radial-gradient(circle, rgba(160,255,232,0.22) 0 1px, transparent 1px 8px);
      opacity: 0.65;
    }
    .holo-orbit {
      position: absolute;
      inset: 10px;
      transform-style: preserve-3d;
    }
    .holo-orbit span {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 9999px;
      background: #95ffeb;
      box-shadow: 0 0 16px rgba(149,255,235,0.95);
      transform: translate(-50%, -50%) translateX(138px);
    }
    .holo-orbit.orbit-a { animation: orbitSpinA 8s linear infinite; }
    .holo-orbit.orbit-b { animation: orbitSpinB 10s linear infinite; }
    .holo-orbit.orbit-c { animation: orbitSpinC 12s linear infinite; }
  </style>
</head>
<body class="min-h-screen flex" style="background:#080f1a;">

  <!-- Sol panel -->
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden flex-col justify-between p-14"
       style="background:linear-gradient(160deg,#0b1628 0%,#0d2137 60%,#0b2a2a 100%);">

    <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
          <line x1="48" y1="0" x2="0" y2="48" stroke="rgba(99,202,183,0.07)"/>
          <line x1="0" y1="0" x2="48" y2="0" stroke="rgba(99,202,183,0.07)"/>
          <line x1="0" y1="0" x2="0" y2="48" stroke="rgba(99,202,183,0.07)"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
    </svg>

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="scan-line"></div>
    </div>

    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full pulse-slow pointer-events-none"
         style="background:radial-gradient(circle,rgba(99,202,183,0.22) 0%,transparent 70%);"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 holo-wrap pointer-events-none">
      <div class="holo-core">
        <div class="holo-ring ring-a"></div>
        <div class="holo-ring ring-b"></div>
        <div class="holo-ring ring-c"></div>
        <div class="holo-orbit orbit-a"><span></span></div>
        <div class="holo-orbit orbit-b"><span></span></div>
        <div class="holo-orbit orbit-c"><span></span></div>
        <div class="holo-glow"></div>
        <div class="holo-grid"></div>
      </div>
    </div>

    <div class="relative z-10 fade-up fade-up-1">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center"
             style="background:rgba(99,202,183,0.12);border:1px solid rgba(99,202,183,0.25);">
           <i class="fa-solid fa-brain" style="color: #BEFF0B;"></i>
        </div>
        <span class="brand text-white text-xl">AiMedical<span class="text-teal-400">Support</span></span>
      </div>
    </div>

    <div class="relative z-10">
      <p class="fade-up fade-up-2 text-slate-400 text-sm font-light leading-relaxed max-w-xs">
        Yapay zeka destekli beyin beyin tomografisi analizi
      </p>
      <div class="fade-up fade-up-3 mt-6 flex gap-6">
        <div>
          <p class="text-teal-400 text-2xl brand" id="AccuracyRate"></p>
          <p class="text-slate-500 text-xs mt-0.5">Doğruluk oranı anlık</p>
        </div>
        <div class="w-px bg-slate-700/50"></div>
       
      </div>
    </div>
  </div>

   <div id="themeBtn" style="right: 30px; position: fixed; top:15px;"></div>
  <div class="flex-1 flex items-center justify-center p-8" style="background: var(--bg-primary);" >

    <div class="w-full max-w-sm" style="color: #000;">
      
      


      <div style="bottom: 65px; position: relative;">
        <span class="brand text-white text-2xl" style="color: var(--text-second)"  >AiMedical<span class="text-teal-400">Support</span></span>
        <div style="color: #3B9E8AA7;">Yapay zeka destekli beyin beyin tomografisi analizi</div>
      </div>


      
      <div class="fade-up fade-up-1 flex gap-8 mb-8" style="border-bottom:1px solid rgba(255 255 255 / 0.92);">
        <button class="tab-btn active" id="tabLogin" style="color: var(--text-primary)" onclick="switchTab('login')">Giriş Yap</button>
        <button class="tab-btn" id="tabRegister" style="color: var(--text-primary)" onclick="switchTab('register')">Kayıt Ol</button>
      </div>

      <!-- Alert -->
      <div id="alertBox" class="hidden mb-5 rounded-lg px-4 py-3 text-sm flex items-center gap-2"></div>

      <!-- LOGIN -->
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div class="fade-up fade-up-2">
          <label class="block text-slate-400 text-xs mb-2 tracking-widest uppercase" style="color: var(--text-primary);">E-posta</label>
          <input id="loginEmail" type="email" placeholder="doktor@hastane.com"
                 class="input-field w-full px-4 py-3 rounded-lg text-sm" style="border: var(--border); background: var(--bg-antilight );"   required/>
        </div>
        <div class="fade-up fade-up-3">
          <label class="block text-slate-400 text-xs mb-2 tracking-widest uppercase" style="color: var(--text-primary);">Şifre</label>
          <div class="relative">
            <input id="loginPassword" type="password" placeholder="••••••••"
                   class="input-field w-full px-4 py-3 rounded-lg text-sm pr-12"  style="border: var(--border); background: var(--bg-antilight );" required/>
            <button type="button" onclick="togglePwd('loginPassword')"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="fade-up fade-up-4">
          <button type="button" id="googleBtn" onclick="handleGoogleLogin()" style="color: var(--text-second); border: 2px solid yellow; background: var(--bg-primary );" class="btn-google w-full py-3 rounded-lg text-sm flex items-center justify-center gap-3">
          <i class="fa-brands fa-google" style="color: var(--text-green);"></i>
            Google ile Giriş Yap
          </button>
        </div>
        <div class="fade-up fade-up-4 auth-divider">veya</div>
        <div class="fade-up fade-up-4 pt-1">
          <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-lg text-white text-sm">
            Giriş Yap
          </button>
        </div>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
        <div class="field-enter">
          <label class="block text-slate-400 text-xs mb-2 tracking-widest uppercase" style="color: var(--text-primary);">Ad Soyad</label>
          <input id="regName" type="text" placeholder="Ahmet Yılmaz"
                 class="input-field w-full px-4 py-3 rounded-lg text-sm"  style="border: var(--border); background: var(--bg-antilight );" required/>
        </div>
        <div class="field-enter" style="animation-delay:0.06s">
          <label class="block text-slate-400 text-xs mb-2 tracking-widest uppercase" style="color: var(--text-primary);">E-posta</label>
          <input id="regEmail" type="email" placeholder="adres@mail.com"
                 class="input-field w-full px-4 py-3 rounded-lg text-sm"  style="border: var(--border); background: var(--bg-antilight );" required/>
        </div>
        <div class="field-enter" style="animation-delay:0.12s">
          <label class="block text-slate-400 text-xs mb-2 tracking-widest uppercase" style="color: var(--text-primary);">Şifre</label>
          <div class="relative">
            <input id="regPassword" type="password" placeholder="••••••••"
                   class="input-field w-full px-4 py-3 rounded-lg text-sm pr-12"  style="border: var(--border); background: var(--bg-antilight );" required/>
            <button type="button" onclick="togglePwd('regPassword')"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="field-enter" style="animation-delay:0.18s">
          <label class="block text-slate-400 text-xs mb-2 tracking-widest uppercase" style="color: var(--text-primary);">
            Uzmanlık <span class="text-slate-600 normal-case font-light">(opsiyonel)</span>
          </label>
          <input id="regSpecialty" type="text" placeholder="Nöroloji, Radyoloji..."
                 class="input-field w-full px-4 py-3 rounded-lg text-sm"  style="border: var(--border); background: var(--bg-antilight );"/>
        </div>
        <div class="field-enter pt-2" style="animation-delay:0.24s">
          <button type="submit" id="registerBtn" class="btn-primary w-full py-3 rounded-lg text-white text-sm">
            Hesap Oluştur
          </button>
        </div>
      </form>

    </div>
  </div>
  <script src="Template.js"></script>
  <script>
      document.addEventListener('DOMContentLoaded', () => {
     Theme.renderToggle('themeBtn');

  });

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('registerForm').classList.toggle('hidden', isLogin);
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      hideAlert();
    }

    function togglePwd(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      const err = type === 'error';
      box.className = `mb-5 rounded-lg px-4 py-3 text-sm flex items-center gap-2 ${err ? 'text-red-300' : 'text-teal-300'}`;
      box.style.background = err ? 'rgba(239,68,68,0.1)' : 'rgba(99,202,183,0.1)';
      box.style.border = err ? '1px solid rgba(239,68,68,0.2)' : '1px solid rgba(99,202,183,0.2)';
      box.innerHTML = `<svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="${err ? 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' : 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'}"/>
      </svg><span>${msg}</span>`;
      box.classList.remove('hidden');
    }

    function hideAlert() { document.getElementById('alertBox').classList.add('hidden'); }

    function setLoading(btnId, loading, label) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? `<svg class="animate-spin inline w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24">
             <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
             <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
           </svg>Lütfen bekleyin...`
        : label;
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideAlert();
      setLoading('loginBtn', true, 'Giriş Yap');
      try {
        const res = await fetch('http://localhost:8000/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        if (res.ok) {
          window.location.href = '/AdminPage.html';
        } else {
          const data = await res.json();
          showAlert(data.detail || 'E-posta veya şifre hatalı', 'error');
        }
      } catch {
        showAlert('Sunucuya bağlanılamadı', 'error');
      } finally {
        setLoading('loginBtn', false, 'Giriş Yap');
      }
    }

    function handleGoogleLogin() {
      hideAlert();
      const btn = document.getElementById('googleBtn');
      if (!btn) return;

      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>Google yonlendirmesi...`;

      const googleAuthUrl = 'http://localhost:8000/api/v1/auth/google/login';
      setTimeout(() => { window.location.href = googleAuthUrl; }, 200);
      setTimeout(() => {
        if (document.visibilityState === 'visible') {
          btn.disabled = false;
          btn.innerHTML = originalText;
        }
      }, 3000);
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideAlert();
      setLoading('registerBtn', true, 'Hesap Oluştur');
      try {
        const res = await fetch('http://localhost:8000/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            full_name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
            specialty: document.getElementById('regSpecialty').value || null
          })
        });
        if (res.ok) {
          showAlert('Hesabınız oluşturuldu! Giriş yapabilirsiniz.', 'success');
          document.getElementById('registerForm').reset();
          setTimeout(() => switchTab('login'), 1800);
        } else {
          const data = await res.json();
          showAlert(data.detail || 'Kayıt başarısız', 'error');
        }
      } catch {
        showAlert('Sunucuya bağlanılamadı', 'error');
      } finally {
        setLoading('registerBtn', false, 'Hesap Oluştur');
      }
    }


    function countUp(element, target, duration = 1000, suffix = '') {
  let start = 0;
  const increment = target / (duration / 16);
  const step = () => {
    start += increment;
    if (start < target) {
      element.textContent = Math.floor(start) + suffix;
      requestAnimationFrame(step);
    } else {
      element.textContent = target + suffix;
    }
  };
  step();
}
const el = document.getElementById('AccuracyRate');
if (el) countUp(el, 55, 2000, '%');
  </script>
</body>
</html>
