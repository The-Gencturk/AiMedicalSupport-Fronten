<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kullanici Detaylari</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
  <link rel="stylesheet" href="Theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .role-chip {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #e5e7eb;
      border-radius: 9999px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body class="min-h-screen flex" style="background: var(--bg-primary);">
  <div id="AdminMenu"></div>
  <div id="themeBtn" style="right: 30px; position: fixed; top: 15px;"></div>

  <main class="flex-1 p-4 md:p-8">
    <a href="Users.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Geri</span>
    </a>

    <div id="errorMessage" class="hidden mb-6 rounded-xl border border-red-400/30 bg-red-500/10 px-4 py-3 text-red-200"></div>

    <section class="card mb-6">
      <div class="flex flex-col md:flex-row md:items-center gap-5">
        <img id="profileImage" class="w-24 h-24 rounded-full object-cover border border-white/10" src="/TemplateImage/miniverse_logo.jpg" alt="Profil" />

        <div class="flex-1">
          <h1 id="fullName" class="text-2xl md:text-3xl font-bold text-white">-</h1>
          <p id="email" class="text-gray-400 mt-1">-</p>

          <div class="mt-3 flex flex-wrap items-center gap-2">
            <span id="statusBadge" class="px-2 py-1 text-xs rounded-full">-</span>
            <span id="specialtyBadge" class="px-2 py-1 text-xs rounded-full bg-primary/20 text-primary">-</span>
          </div>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="card">
        <h2 class="text-xl font-semibold text-white mb-4">Kullanici Bilgileri</h2>

        <div class="space-y-3 text-gray-300">
          <div class="flex items-center justify-between gap-4 border-b border-white/10 pb-2">
            <span class="text-gray-400">ID</span>
            <span id="personelId" class="font-medium text-white">-</span>
          </div>

          <div class="flex items-center justify-between gap-4 border-b border-white/10 pb-2">
            <span class="text-gray-400">Tam Ad</span>
            <span id="personelName" class="font-medium text-white">-</span>
          </div>

          <div class="flex items-center justify-between gap-4 border-b border-white/10 pb-2">
            <span class="text-gray-400">E-Posta</span>
            <span id="personelEmail" class="font-medium text-white text-right">-</span>
          </div>

          <div class="flex items-center justify-between gap-4 border-b border-white/10 pb-2">
            <span class="text-gray-400">Uzmanlik</span>
            <span id="personelSpecialty" class="font-medium text-white">-</span>
          </div>

          <div class="flex items-center justify-between gap-4">
            <span class="text-gray-400">Durum</span>
            <span id="personelStatusText" class="font-medium text-white">-</span>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="text-xl font-semibold text-white mb-4">Roller</h2>
        <div id="rolesContainer" class="flex flex-wrap gap-2"></div>
      </div>
    </section>
  </main>

  <script>
    const PERSONEL_API_ORIGIN = "http://localhost:8000";

    function getUserIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("UserID") || params.get("userId") || params.get("id");
    }

    function buildProfileCandidateUrls(profilePath) {
      if (!profilePath) return ["/TemplateImage/miniverse_logo.jpg"];
      if (/^https?:\/\//i.test(profilePath)) return [profilePath];

      const rawPath = String(profilePath).replace(/\\/g, "/");
      const normalized = rawPath.startsWith("/") ? rawPath : `/${rawPath}`;
      const withoutWwwroot = normalized.replace(/^\/wwwroot/i, "");
      const withWwwroot = normalized.startsWith("/wwwroot/")
        ? normalized
        : `/wwwroot${normalized}`;

      const candidates = [
        `${PERSONEL_API_ORIGIN}${normalized}`,
        `${PERSONEL_API_ORIGIN}${withoutWwwroot}`,
        `${PERSONEL_API_ORIGIN}${withWwwroot}`,
        normalized,
        withoutWwwroot,
        withWwwroot
      ];

      return [...new Set(candidates)];
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value ?? "-";
    }

    function showError(message) {
      const box = document.getElementById("errorMessage");
      if (!box) return;
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function renderStatus(isActive) {
      const badge = document.getElementById("statusBadge");
      const statusText = isActive ? "Aktif" : "Pasif";

      if (badge) {
        badge.textContent = statusText;
        badge.className = isActive
          ? "px-2 py-1 text-xs rounded-full bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300"
          : "px-2 py-1 text-xs rounded-full bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300";
      }

      setText("personelStatusText", statusText);
    }

    function renderRoles(roles, specialty) {
      const container = document.getElementById("rolesContainer");
      if (!container) return;

      const roleList = Array.isArray(roles) && roles.length > 0
        ? roles
        : specialty
          ? [specialty]
          : [];

      container.innerHTML = "";

      if (roleList.length === 0) {
        container.innerHTML = '<span class="text-gray-400">Rol bilgisi yok.</span>';
        return;
      }

      roleList.forEach((role) => {
        const span = document.createElement("span");
        span.className = "role-chip";
        span.textContent = role;
        container.appendChild(span);
      });
    }

    function renderUser(user) {
      const fullName = user.full_name || "-";
      const email = user.email || "-";
      const specialty = user.specialty || "-";
      const isActive = Boolean(user.is_active);

      setText("fullName", fullName);
      setText("email", email);
      setText("personelId", String(user.id ?? "-"));
      setText("personelName", fullName);
      setText("personelEmail", email);
      setText("personelSpecialty", specialty);
      setText("specialtyBadge", specialty);

      renderStatus(isActive);
      renderRoles(user.roles, specialty);
      
      const profileImage = document.getElementById("profileImage");
      if (profileImage) {
        const imageCandidates = buildProfileCandidateUrls(user.profile);
        let candidateIndex = 0;

        const tryNextImage = () => {
          if (candidateIndex >= imageCandidates.length) {
            profileImage.onerror = null;
            profileImage.src = "/TemplateImage/miniverse_logo.jpg";
            return;
          }

          profileImage.src = imageCandidates[candidateIndex];
          candidateIndex += 1;
        };

        profileImage.onerror = tryNextImage;
        tryNextImage();
      }
    }

    async function loadUserDetails() {
      const userId = getUserIdFromQuery();

      if (!userId) {
        showError("UserID parametresi bulunamadi.");
        return;
      }

      try {
        const response = await fetch(`${PERSONEL_API_ORIGIN}/api/v1/personel/GetByIdPersonel/${encodeURIComponent(userId)}`, {
          method: "GET",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const user = await response.json();
        renderUser(user);
      } catch (error) {
        console.error("Kullanici detayi alinamadi:", error);
        showError("Kullanici bilgileri alinamadi. Endpoint veya yetkiyi kontrol et.");
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (typeof Theme !== "undefined" && typeof Theme.renderToggle === "function") {
        Theme.renderToggle("themeBtn");
      }

      if (typeof getCurrentUser === "function") {
        try {
          await getCurrentUser();
        } catch (_) {
          // Auth kontrolu varsa sessiz devam et
        }
      }

      loadUserDetails();
    });
  </script>

  <script src="MenuLoader.js"></script>
  <script src="auth.js"></script>
  <script src="AdminMenuOptions.js"></script>
  <script src="Template.js"></script>
</body>
</html>
